# Railway-optimized docker-compose for development
version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app/
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - DEBUG=0
      - ETH_L2_NETWORK=1
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
    command: docker/web/run_web.sh

  # Simplified worker for Railway (combines all worker types)
  worker:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    environment:
      - PYTHONPATH=/app/
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - DEBUG=0
      - ETH_L2_NETWORK=1
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
    command: docker/web/celery/worker.sh

  scheduler:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    environment:
      - PYTHONPATH=/app/
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - DEBUG=0
      - ETH_L2_NETWORK=1
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
    command: docker/web/celery/scheduler.sh

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
